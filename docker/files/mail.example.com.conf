<VirtualHost *:80>
	ServerName mail.example.com
	ServerAlias www.mail.example.com
	ServerAdmin nobody@nowhere.com
	DocumentRoot /var/www/mail.example.com/
	CustomLog /var/log/apache2/mail_example_com_access.log combined
	ErrorLog /var/log/apache2/mail_example_com_error.log
        <Directory />
                Options Indexes FollowSymLinks MultiViews
                AllowOverride All
                Require all granted
        </Directory>
        <Directory /var/www/mail.example.com/>
                Options Indexes FollowSymLinks MultiViews
                AllowOverride All
                Require all granted
        </Directory>
</VirtualHost>
