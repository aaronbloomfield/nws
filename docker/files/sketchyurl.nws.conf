<VirtualHost *:80>
	ServerName sketchyurl.nws
	ServerAlias www.sketchyurl.nws
	ServerAdmin nobody@nowhere.com
	DocumentRoot /var/www/sketchyurl.nws/
	CustomLog /var/log/apache2/sketchyurl_nws_access.log combined
	ErrorLog /var/log/apache2/sketchyurl_nws_error.log
        <Directory />
                Options Indexes FollowSymLinks MultiViews
                AllowOverride All
                Require all granted
        </Directory>
        <Directory /var/www/sketchyurl.nws/>
                Options Indexes FollowSymLinks MultiViews
                AllowOverride All
                Require all granted
        </Directory>
</VirtualHost>
